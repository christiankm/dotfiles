---
name: Request Copilot Code Review
on:
  pull_request:
    types:
      - opened
      - ready_for_review
    branches:
      - main
jobs:
  copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-24.04
    # Skip draft PRs — Copilot will be requested when the PR is marked ready
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot code review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['copilot-pull-request-reviewer'],
              });
              console.log('Copilot review requested successfully.');
            } catch (error) {
              console.log(`Could not request Copilot review: ${error.message}`);
            }
