---
name: Verify

on:
  push:
    branches: ["main"]
    paths:
      - "ansible/**"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.sh"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "ansible/**"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.sh"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Install Ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run pre-commit (shellcheck, yamllint, ansible-lint, actionlint, …)
        uses: pre-commit/action@v3.0.1

  verify:
    name: Verify dotfiles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Inventory validation
        run: ansible-inventory --list > /dev/null

      - name: Ansible playbook syntax check
        run: |
          for playbook in ansible/playbooks/*.yml; do
            echo "Checking $playbook"
            ansible-playbook --syntax-check "$playbook"
          done

      - name: Shell script syntax check
        run: find . -name "*.sh" -not -path "./.git/*" -print0 | xargs -0 -I{} bash -n {}
