---
name: Lint Fix

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    name: Auto-fix and raise PR
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Install Ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install community.general

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit (auto-fix)
        run: pre-commit run --all-files
        continue-on-error: true

      - name: Create pull request with fixes
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "style: apply pre-commit auto-fixes"
          title: "style: apply pre-commit auto-fixes"
          body: |
            Auto-generated by the [Lint Fix](.github/workflows/lint-fix.yml) workflow.

            Pre-commit auto-fixing hooks were run against all files. The changes
            in this PR are the result of hooks such as `end-of-file-fixer`,
            `trailing-whitespace`, and `pretty-format-json`.
          branch: lint-fix/auto-fixes
          delete-branch: true
          labels: "automated"
