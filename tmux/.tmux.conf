# tmux configuration

# Load theme
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Run theme
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Load plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'nhdaly/tmux-scroll-copy-mode'

# Reset before applying theme
set-option -g status-left ""
set-option -g status-right ""

# Customize theme
set -g @catppuccin_flavor 'mocha'

# Windows
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_current_number_color "#{@thm_yellow}"
set -g @catppuccin_window_current_text_color "#{@thm_serface_1}"
set -g @catppuccin_window_text " #W#F"
set -g @catppuccin_window_current_text " #W#F"

# Modules
set -g @catppuccin_directory_text " #{s|$HOME/|~/|:pane_current_path}"

# Status bar
set-option -g status-position top
set-option -g status-interval 5
set -g status-justify centre
set -g status-left-length 100
set -g status-right-length 100
set -g @catppuccin_status_background "none"
set -ag status-left '#{E:@catppuccin_status_session}'
set -ag status-right '#{E:@catppuccin_status_directory}'
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Customizations

# Enable mouse mode
set -g mouse on

set -g default-terminal 'tmux-256color'
set -g @continuum-restore 'on'

# Start windows and panes at 1, not 0
# Re-number when closing windows
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Keybindings

# Use CTRL+B + K (leading + capital K) to uninstall plugins
# instead of the default CTRL+B + alt + U
# On macOS, the option-key does not have the same
# effect as the alt key
set -g @tpm-clean 'K'

# Reload config with CTRL+b + r
unbind r
bind r \
    source-file ~/.tmux.conf \;\
    display 'Reloaded tmux config'

# Use vim keybindings
setw -g mode-keys vi

# Shift + alt + vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Move around panes with vim keys
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# Split panes in the current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Open new shell on top of window
bind C-z display-popup -d "#{pane_current_path}" -w 80% -h 80% -E

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
