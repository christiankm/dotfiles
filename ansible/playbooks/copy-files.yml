---
- name: Install binaries and scripts
  hosts: localhost
  vars:
    bin_dir: "{{ playbook_dir }}/../../bin/"
  tasks:
    - name: Create bin directory
      ansible.builtin.file:
        dest: "$HOME/bin"
        state: directory
        mode: "0755"

    - name: Find all scripts
      ansible.builtin.find:
        paths: "{{ bin_dir }}"
        recurse: true
        file_type: file
      register: scripts_to_link

    - name: Symlink scripts
      ansible.builtin.file:
        src: "{{ item.path }}"
        dest: "$HOME/bin/{{ item.path | basename }}"
        state: link
      loop: "{{ scripts_to_link.files }}"
      when: scripts_to_link.matched > 0
