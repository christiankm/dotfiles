---
- name: Configure vim and neovim
  hosts: localhost
  vars:
    vim_dir: "{{ root_dir }}/vim"
    nvim_dir: "{{ root_dir }}/nvim"

  tasks:
    - name: Link .vimrc to Home
      ansible.builtin.file:
        src: "{{ vim_dir }}/.vimrc"
        dest: "$HOME/.vimrc"
        state: link
        force: true

    - name: Create vim directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "$HOME/.vim/pack/default/start"
        - "$HOME/.vim/plugin"
        - "$HOME/.vim/after/syntax"

    - name: Clone gruvbox theme
      ansible.builtin.git:
        repo: https://github.com/morhetz/gruvbox.git
        dest: "$HOME/.vim/pack/default/start/gruvbox"
        force: true

    - name: Link plugin files
      ansible.builtin.file:
        src: "{{ vim_dir }}/plugins/{{ item }}"
        dest: "$HOME/.vim/plugin/{{ item }}"
        state: link
        force: true
      loop:
        - checkbox.vim

    - name: Link after/syntax files
      ansible.builtin.file:
        src: "{{ vim_dir }}/after/syntax/{{ item }}"
        dest: "$HOME/.vim/after/syntax/{{ item }}"
        state: link
        force: true
      loop:
        - markdown.vim

    - name: Link nvim to config
      ansible.builtin.file:
        src: "{{ nvim_dir }}"
        dest: "$HOME/.config/nvim"
        state: link
